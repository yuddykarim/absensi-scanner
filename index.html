<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Presensi Scanner</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
    body {
        font-family: 'Arial', sans-serif;
        background-color: #f1f3f8;
        margin: 0; display: flex; flex-direction: column; align-items: center; padding-top: 20px;
    }

    /* Jam Digital */
    #digital-clock {
        font-size: 48px; font-weight: bold; color: #1a1c42; margin-bottom: 20px;
    }

    .card {
        width: 340px; background: white; border-radius: 20px;
        overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center;
    }

    .header {
        background-color: #1a1c42; color: white; padding: 15px; font-weight: bold; font-size: 18px;
    }

    /* AREA KAMERA - Sekarang ini yang menjadi Bingkai Utama */
    .camera-container { 
        padding: 15px;
        margin: 15px;
        border: 4px solid #ddd; /* Abu-abu Awal */
        border-radius: 15px;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Animasi membal */
        background: #f8f9fa;
        position: relative;
    }

    /* Efek Berhasil (Hijau) - Dipicu lewat JS ke .camera-container */
    .camera-container.scan-success {
        border-color: #2ecc71 !important;
        transform: scale(1.05);
        box-shadow: 0 0 20px rgba(46, 204, 113, 0.3);
    }

    /* Efek Berhasil (Biru untuk Pulang) */
    .camera-container.scan-pulang {
        border-color: #3498db !important;
        transform: scale(1.05);
        box-shadow: 0 0 20px rgba(52, 152, 219, 0.3);
    }

    /* Elemen Reader (Kamera Asli) */
    #reader {
        width: 100%; 
        border: none !important; /* Hilangkan border bawaan library */
        border-radius: 10px;
        overflow: hidden;
    }

    /* Status Box */
    #status-container {
        margin: 5px 20px 20px 20px; padding: 15px; 
        background-color: #fff0f0;
        border-radius: 12px; color: #d63031; font-size: 14px;
        font-weight: bold; min-height: 50px; 
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        transition: all 0.3s;
    }

    /* Tombol Navigasi */
    .button-group {
        display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 20px 15px 20px;
    }
    .btn { border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .btn:active { transform: scale(0.95); }
    .btn-blue { background-color: #e8f0fe; color: #1a73e8; }
    .btn-purple { background-color: #f3e5f5; color: #9c27b0; }
    .btn-full { grid-column: span 2; background-color: #f8f9fa; color: #5f6368; border: 1px solid #ddd; }
</style>
</head>
<body>

    <div id="digital-clock">00:00:00</div>

    <div class="card">
        <div class="header">Scanner</div>
        <div class="camera-container">
            <div id="reader"></div>
        </div>
        <div id="status-container">
            <span id="status-text">Menunggu Kamera...</span>
        </div>
        <div class="button-group">
            <button class="btn btn-blue" onclick="switchCamera('environment')">Belakang</button>
            <button class="btn btn-purple" onclick="switchCamera('user')">Depan</button>
            <button class="btn btn-full" onclick="window.close()">Kembali</button>
        </div>
    </div>

    <audio id="beepAudio" preload="auto">
        <source src="https://raw.githubusercontent.com/yuddykarim/absensi-scanner/main/beep.mp3" type="audio/mpeg">
        <source src="data:audio/wav;base64,UklGRl9vT19XQVZFRm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YT1vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19v" type="audio/wav">
    </audio>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbzhETx9DIZp6WakTELbOoV4TXQreQ2Kh_WSap1U0vWEVqKDcFhH3tFYNSXoQXqDucY9/exec";
    const statusText = document.getElementById("status-text");
    const statusContainer = document.getElementById("status-container");
    const readerElem = document.getElementById("reader");
    const beep = document.getElementById("beepAudio");
    let html5QrCode;
    let isProcessing = false;

    // Fungsi Jam Digital Realtime di Atas Kamera
function updateClock() {
    const now = new Date();
    // Gunakan id-ID agar formatnya 24 jam dan sesuai zona waktu perangkat
    const options = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
    document.getElementById('digital-clock').innerText = now.toLocaleTimeString('id-ID', options);
}
setInterval(updateClock, 1000);

    function onScanSuccess(decodedText) {
    if (isProcessing) return;
    isProcessing = true;

    const container = document.querySelector(".camera-container");
    const statusBox = document.getElementById("status-container");

    // 1. Langsung nyalakan bingkai hijau (default sukses)
    container.classList.add("scan-success"); 

    fetch(scriptURL, { method: "POST", body: JSON.stringify({ qr: decodedText }) })
    .then(res => res.json())
    .then(result => {
        if (result.success && result.type === 'pulang') {
            // Jika ternyata absen pulang, ganti class-nya ke biru
            container.classList.remove("scan-success");
            container.classList.add("scan-pulang");
        }
        // ... sisa kode result Bapak ...
    })
    .finally(() => {
        setTimeout(() => {
            isProcessing = false;
            // Kembalikan ke normal
            container.classList.remove("scan-success");
            container.classList.remove("scan-pulang");
        }, 5000); 
    });
}
    function startScanner(side) {
        if(html5QrCode) {
            html5QrCode.stop().then(() => {
                mountScanner(side);
            });
        } else {
            mountScanner(side);
        }
    }

    function mountScanner(side) {
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start(
            { facingMode: side }, 
            { fps: 10, qrbox: 200 },
            onScanSuccess
        ).then(() => {
            statusText.innerText = "Kamera Aktif. Silakan Scan.";
        }).catch(err => {
            statusText.innerText = "Gagal Kamera: " + err;
        });
    }

    function switchCamera(side) {
        startScanner(side);
    }

    // Browser sering memblokir audio otomatis, jadi kita butuh satu klik user di awal
    window.onclick = () => { beep.load(); };
    window.onload = () => startScanner("environment");
</script>
</body>
</html>
