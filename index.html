<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Presensi Scanner</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
        }
        .container {
            background: white; padding: 20px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center;
        }
        h2 { color: #1a73e8; margin-bottom: 20px; font-size: 22px; }
        
        /* Bingkai Scanner */
        #reader {
            width: 100%; border-radius: 12px; overflow: hidden;
            border: 6px solid #ffffff; /* Putih Awal */
            transition: all 0.3s ease; box-sizing: border-box;
        }
        #reader.success { border-color: #2ecc71; transform: scale(1.02); }

        .status-box {
            margin-top: 20px; padding: 15px; border-radius: 10px;
            background: #f8f9fa; min-height: 50px; display: flex; align-items: center; justify-content: center;
        }
        #status-text { font-weight: 600; color: #5f6368; font-size: 16px; }
        
        /* Animasi */
        .fade-in { animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container fade-in">
    <h2>Scanner Presensi Guru</h2>
    
    <div id="reader"></div>

    <div class="status-box">
        <div id="status-text">Menyiapkan Kamera...</div>
    </div>
</div>

<audio id="beep">
    <source src="data:audio/wav;base64,UklGRl9vT19XQVZFRm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YT1vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19v" type="audio/wav">
</audio>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbwelKIpYAGqzkjIZndZqWWOXcaYDojnR8pPqa3965ugzcyTE0gHnFKvI2PzQlMnWb2b/exec";
    const statusText = document.getElementById("status-text");
    const readerBox = document.getElementById("reader");
    const beep = document.getElementById("beep");
    
    let isProcessing = false;

    function onScanSuccess(decodedText) {
        if (isProcessing) return;
        
        isProcessing = true;
        // Efek Visual & Suara
        readerBox.classList.add("success");
        statusText.style.color = "#2ecc71";
        statusText.innerText = "✅ Terdeteksi: " + decodedText;
        beep.play().catch(e => console.log("Audio play blocked"));

        // Kirim ke GAS
        fetch(scriptURL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({ qr: decodedText }),
            headers: { "Content-Type": "text/plain" }
        })
        .then(() => {
            setTimeout(() => {
                // Auto-Resume
                isProcessing = false;
                readerBox.classList.remove("success");
                statusText.style.color = "#5f6368";
                statusText.innerText = "Siap scan berikutnya...";
            }, 2000); // Jeda 2 detik
        })
        .catch(err => {
            console.error(err);
            isProcessing = false;
        });
    }

    function startScanner() {
        const html5QrCode = new Html5Qrcode("reader");
        const config = { 
            fps: 15, 
            qrbox: { width: 250, height: 250 },
            aspectRatio: 1.0 
        };

        html5QrCode.start(
            { facingMode: "environment" }, 
            config, 
            onScanSuccess
        )
        .then(() => {
            statusText.innerText = "Kamera Aktif. Silakan Scan.";
        })
        .catch(err => {
            statusText.innerText = "❌ Kamera Error: " + err;
        });
    }

    window.onload = startScanner;
</script>

</body>
</html>
