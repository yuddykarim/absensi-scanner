<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Presensi Scanner</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    
    <div id="blocker" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f8fafc; z-index: 99999; flex-direction: column; align-items: center; justify-content: center; text-align: center; font-family: sans-serif;">
    <h1 style="font-size: 72px; margin: 0; color: #e11d48;">404</h1>
    <p style="font-size: 18px; margin: 15px 0; font-weight: bold; color: #334155;">Halaman Scanner QR Code tidak bisa diakses<br>selain dari perangkat resmi sekolah.</p>
    <div style="font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px;">Security System Integrated | v3.0 E-Presensi sekolah</div>
</div>

<script>
  (function() {
    // 1. PENGATURAN
    const SECRET_KEY = "SobatPresensi2026"; // Pastikan SAMA dengan di GAS
    const urlParams = new URLSearchParams(window.location.search);
    const authInput = urlParams.get('auth');
    const referrer = document.referrer;
    const blocker = document.getElementById('blocker');

    // 2. LOGIKA VALIDASI (Lebih Fleksibel tapi Tetap Aman)
    // Syarat Lolos: Harus ada kunci rahasia yang BENAR di URL
    const isTokenValid = (authInput === SECRET_KEY);
    
    // Kita cek apakah kunci ada. Jika tidak ada kunci, halaman lgsg diblok.
    if (!isTokenValid) {
        blocker.style.display = 'flex';
        window.stop();
        return;
    }

    // 3. PEMBERSIH JEJAK (Sangat Cepat)
    // Segera setelah token divalidasi, kita hapus dari URL bar agar tidak bisa dicopy/dilihat
    if (window.history.replaceState) {
        const cleanUrl = window.location.origin + window.location.pathname;
        window.history.replaceState({}, document.title, cleanUrl);
    }
    
    // Halaman otomatis terbuka normal karena blocker tetap 'display: none'
  })();

  // 4. PENGUNCI INTERAKSI (Anti-Intip)
  document.addEventListener('contextmenu', e => e.preventDefault());
  document.onkeydown = function(e) {
      if (e.keyCode == 123) return false; // F12
      if (e.ctrlKey && e.shiftKey && [73, 74, 67].includes(e.keyCode)) return false; // Ctrl+Shift+I/J/C
      if (e.ctrlKey && e.keyCode == 85) return false; // Ctrl+U
  };
    // CEK KEAMANAN
    if (!referrer.includes("script.google.com") && authInput !== SECRET_KEY) {
        // Tampilkan layar penutup jika ilegal
        blocker.style.display = 'flex';
        window.stop(); 
    }
      // Menghapus parameter ?auth=... dari bar alamat segera setelah divalidasi
if (window.history.replaceState) {
    const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
    window.history.replaceState({path: cleanUrl}, '', cleanUrl);
}
  })();

  // ANTI INSPECT & KLIK KANAN (Tetap sama)
  document.addEventListener('contextmenu', e => e.preventDefault());
  document.onkeydown = function(e) {
      if (e.keyCode == 123) return false;
      if (e.ctrlKey && e.shiftKey && [73, 74, 67].includes(e.keyCode)) return false;
      if (e.ctrlKey && e.keyCode == 85) return false;
  };
</script>

    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f1f3f8;
            margin: 0; display: flex; flex-direction: column; align-items: center; padding-top: 20px;
        }
        #digital-clock {
            font-size: 48px; font-weight: bold; color: #1a1c42; margin-bottom: 20px;
        }
        .card {
            width: 340px; background: white; border-radius: 20px;
            overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center;
        }
        .header {
            background-color: #1a1c42; color: white; padding: 15px; font-weight: bold; font-size: 18px;
        }
        .camera-container { 
            padding: 15px; margin: 15px; border: 4px solid #ddd; border-radius: 15px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); background: #f8f9fa;
        }
        .camera-container.scan-success { border-color: #2ecc71 !important; transform: scale(1.05); }
        .camera-container.scan-pulang { border-color: #3498db !important; transform: scale(1.05); }
        #reader { width: 100%; border: none !important; border-radius: 10px; overflow: hidden; }
        #status-container {
            margin: 5px 20px 20px 20px; padding: 15px; background-color: #fff0f0;
            border-radius: 12px; color: #d63031; font-size: 14px; font-weight: bold;
            min-height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 20px 15px 20px; }
        .btn { border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-blue { background-color: #e8f0fe; color: #1a73e8; }
        .btn-purple { background-color: #f3e5f5; color: #9c27b0; }
        .btn-full { grid-column: span 2; background-color: #f8f9fa; color: #5f6368; border: 1px solid #ddd; }
        
        /* Style dasar tombol Refresh (btn-full) */
.btn-full {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background-color: #f8f9fa; /* Warna dasar abu-abu sangat muda */
    color: #4b5563;           /* Warna teks abu gelap */
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease; /* Agar perubahan warna halus */
}

/* EFEK HOVER MERAH KALEM KHUSUS REFRESH */
.btn-full:hover {
    background-color: #fff1f2 !important; /* Merah sangat muda (Rose 50) */
    color: #e11d48 !important;            /* Teks jadi merah (Rose 600) */
    border-color: #fda4af !important;    /* Border merah muda */
    box-shadow: 0 4px 12px rgba(225, 29, 72, 0.1); /* Bayangan merah tipis */
    transform: translateY(-1px);         /* Efek sedikit terangkat */
}

/* Efek saat tombol diklik */
.btn-full:active {
    transform: translateY(0);
    background-color: #ffe4e6 !important;
}
        
    </style>
</head>
<body>

    <div id="digital-clock">00:00:00</div>

    <div class="card">
        <div class="header">Scanner QR Code</div>
        <div class="camera-container" id="cam-border">
            <div id="reader"></div>
        </div>
        <div id="status-container">
            <div id="status-text">Menunggu Kamera...</div>
        </div>
        <div class="button-group">
            <button class="btn btn-blue" onclick="switchCamera('environment')">Belakang</button>
            <button class="btn btn-purple" onclick="switchCamera('user')">Depan</button>
            <button class="btn btn-full" onclick="location.reload()">Refresh Scanner</button>
        </div>
    </div>

    <audio id="beepAudio" preload="auto">
        <source src="https://raw.githubusercontent.com/yuddykarim/absensi-scanner/main/beep.mp3" type="audio/mpeg">
    </audio>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbz8p4RnDQc3CnVml5bQ93ZoxW1XjtlfyiQK71EiemgKB-lv_px60SUhs-SkvRvKg2uC/exec";
    let html5QrCode;
    let isProcessing = false;

    // Fungsi Jam Digital
    function updateClock() {
        const now = new Date();
        const options = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false, timeZone: 'Asia/Makassar' };
        document.getElementById('digital-clock').innerText = now.toLocaleTimeString('id-ID', options);
    }
    setInterval(updateClock, 1000);
    updateClock();

    function onScanSuccess(decodedText) {
        if (isProcessing) return;
        isProcessing = true;

        const container = document.getElementById("cam-border");
        const statusText = document.getElementById("status-text");
        const statusContainer = document.getElementById("status-container");
        const beep = document.getElementById("beepAudio");

        // Tetap coba putar beep, siapa tahu browser mengizinkan
        if(beep) {
            beep.currentTime = 0;
            beep.play().catch(() => {});
        }

        container.classList.add("scan-success");
        statusText.innerHTML = "Memproses...";

        fetch(scriptURL, { method: "POST", body: JSON.stringify({ qr: decodedText }) })
        .then(res => res.json())
        .then(result => {
    if (result.success) {
        const container = document.getElementById("cam-border");
        const statusContainer = document.getElementById("status-container");
        const statusText = document.getElementById("status-text");

        if (result.type === 'pulang') {
            container.classList.add("scan-pulang");
            statusContainer.style.backgroundColor = "#e3f2fd";
        } else {
            container.classList.add("scan-success");
            statusContainer.style.backgroundColor = "#eafff0";
        }

        let labelStyle = "font-size: 11px; padding: 2px 8px; border-radius: 5px; margin: 5px 0; border: 1px solid; font-weight: bold; ";
        if (result.status.includes("Terlambat") || result.status.includes("CEPAT")) {
            labelStyle += "background: #fff1f2; color: #e11d48; border-color: #ffe4e6;";
        } else {
            labelStyle += "background: #f0fdf4; color: #059669; border-color: #dcfce7;";
        }

        statusText.innerHTML = `
            <div style="font-size:16px; color:#1a1c42; font-weight:bold;">${result.nama}</div>
            <div style="${labelStyle}">${result.status}</div>
            <div style="font-size:24px; color:#1a1c42; font-weight:bold; margin-top:5px;">
                ${result.type === 'datang' ? result.jamDatang : result.jamPulang}
            </div>
        `;
    } else {
        document.getElementById("status-text").innerHTML = `<div style="color:#d63031;">${result.message}</div>`;
    }
})
        .catch(() => { statusText.innerHTML = "Gagal terhubung ke Server."; })
        .finally(() => {
            setTimeout(() => {
                isProcessing = false;
                container.classList.remove("scan-success", "scan-pulang");
                container.style.borderColor = "#ddd";
                statusContainer.style.backgroundColor = "#fff0f0";
                statusText.innerHTML = "Siap scan berikutnya...";
            }, 3000); 
        });
    }

    function startScanner(side) {
        if (html5QrCode) {
            html5QrCode.stop().then(() => mountScanner(side)).catch(() => mountScanner(side));
        } else {
            mountScanner(side);
        }
    }

    function mountScanner(side) {
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: side }, { fps: 10, qrbox: 250 }, onScanSuccess)
        .then(() => { document.getElementById("status-text").innerText = "Kamera Aktif. Silakan Scan."; })
        .catch(err => { document.getElementById("status-text").innerText = "Kamera Error: " + err; });
    }

    function switchCamera(side) { startScanner(side); }

    // Jalankan otomatis tanpa tombol mulai
    window.onload = () => {
        setTimeout(() => startScanner("environment"), 1000);
    };
</script>
</body>
</html>
