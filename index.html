<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scanner Absensi</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
body { font-family: Arial; text-align:center; padding:20px; }
#reader { width:300px; margin:auto; }
button { padding:10px 20px; margin-top:20px; }
</style>
</head>
<body>

<h2>Scan QR Guru</h2>
<div id="reader"></div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbw_Hiw-azPT3iVkGRNcGJJ7AVECkrpd6MHSZnRTd7bMhNfbDb6j9aCrcR3yVJjAwxSw/exec";

function onScanSuccess(decodedText) {

  fetch(scriptURL, {
    method: "POST",
    mode: "no-cors",   // ← TAMBAHKAN INI
    body: JSON.stringify({ qr: decodedText }),
    headers: {
      "Content-Type": "text/plain"
    }
  })
  .then(() => {
    alert("Data terkirim");
  })
  .catch(() => {
    alert("Gagal kirim data");
  });
}
</script>

</body>
</html>
