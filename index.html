<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scanner Absensi</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
body { font-family: Arial; text-align:center; padding:20px; }
#reader { width:300px; margin:auto; }
button { padding:10px 20px; margin-top:20px; }
</style>
<style>
.animate-fade-in {
    animation: fadeIn 0.3s ease-in-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<h2>Scan QR Guru</h2>
<div id="reader"></div>

<script>
let html5QrCode;
let isScanning = false;

function startCamera(facingMode) {

    if (isScanning) return;

    document.getElementById("camLoading").classList.remove("hidden");

    html5QrCode = new Html5Qrcode("reader");

    html5QrCode.start(
        { facingMode: facingMode },
        {
            fps: 10,
            qrbox: { width: 250, height: 250 }
        },
        qrCodeMessage => {

            if (!isScanning) {
                isScanning = true;

                showResult("success", "QR Terdeteksi ✔");

                fetch("URL_WEBAPP_ANDA", {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify({ qr: qrCodeMessage }),
                    headers: { "Content-Type": "text/plain" }
                });

                setTimeout(() => {
                    isScanning = false;
                }, 3000);
            }

        },
        errorMessage => {}
    ).then(() => {

        document.getElementById("camLoading").classList.add("hidden");

    }).catch(err => {

        showResult("error", "Gagal Mengakses Kamera");
        console.error(err);

    });
}

function stopAndBack() {
    if (html5QrCode) {
        html5QrCode.stop().then(() => {
            html5QrCode.clear();
        });
    }
}

function showResult(type, message) {

    const el = document.getElementById("scanResult");
    el.classList.remove("hidden");

    if (type === "success") {
        el.className = "mb-4 text-center text-xs font-bold text-green-600 animate-fade-in";
    } else {
        el.className = "mb-4 text-center text-xs font-bold text-red-600 animate-fade-in";
    }

    el.innerText = message;

    setTimeout(() => {
        el.classList.add("hidden");
    }, 2500);
}
</script>

<script>
function updateClock() {
    const now = new Date();
    const time = now.toLocaleTimeString('id-ID', { hour12: false });
    document.getElementById("scannerClock").innerText = time;
}

setInterval(updateClock, 1000);
updateClock();
</script>
        
</body>
</html>
