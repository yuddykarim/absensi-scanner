<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Presensi Scanner</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f1f3f8;
            margin: 0; display: flex; flex-direction: column; align-items: center; padding-top: 20px;
        }

        /* Jam Digital */
        #digital-clock {
            font-size: 48px; font-weight: bold; color: #1a1c42; margin-bottom: 20px;
        }

        .card {
            width: 320px; background: white; border-radius: 15px;
            overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center;
        }

        .header {
            background-color: #1a1c42; color: white; padding: 12px; font-weight: bold; font-size: 18px;
        }

        .camera-container { padding: 20px; }

        /* Bingkai Kamera - Awalnya Abu-abu tipis */
        #reader {
            width: 100%; border: 4px solid #ddd; border-radius: 10px;
            overflow: hidden; transition: all 0.3s;
        }

        /* Kelas untuk Bingkai Hijau saat Berhasil */
        #reader.scan-success {
            border: 6px solid #2ecc71 !important; transform: scale(1.02);
        }

        #status-container {
            margin: 10px 20px; padding: 15px; background-color: #fff0f0;
            border-radius: 8px; color: #d63031; font-size: 14px;
            font-weight: bold; min-height: 40px; display: flex; align-items: center; justify-content: center;
        }

        .button-group {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 20px 10px 20px;
        }
        .btn { border: none; padding: 10px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .btn-blue { background-color: #e8f0fe; color: #1a73e8; }
        .btn-purple { background-color: #f3e5f5; color: #9c27b0; }
        .btn-full { grid-column: span 2; background-color: #f8f9fa; color: #5f6368; margin-bottom: 15px; border: 1px solid #ddd; }
    </style>
</head>
<body>

    <div id="digital-clock">00:00:00</div>

    <div class="card">
        <div class="header">Scanner</div>
        <div class="camera-container">
            <div id="reader"></div>
        </div>
        <div id="status-container">
            <span id="status-text">Menunggu Kamera...</span>
        </div>
        <div class="button-group">
            <button class="btn btn-blue" onclick="switchCamera('environment')">Belakang</button>
            <button class="btn btn-purple" onclick="switchCamera('user')">Depan</button>
            <button class="btn btn-full" onclick="window.close()">Kembali</button>
        </div>
    </div>

    <audio id="beepAudio" preload="auto">
        <source src="https://raw.githubusercontent.com/yuddykarim/absensi-scanner/main/beep.mp3" type="audio/mpeg">
        <source src="data:audio/wav;base64,UklGRl9vT19XQVZFRm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YT1vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19vT19v" type="audio/wav">
    </audio>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbzhETx9DIZp6WakTELbOoV4TXQreQ2Kh_WSap1U0vWEVqKDcFhH3tFYNSXoQXqDucY9/exec";
    const statusText = document.getElementById("status-text");
    const statusContainer = document.getElementById("status-container");
    const readerElem = document.getElementById("reader");
    const beep = document.getElementById("beepAudio");
    let html5QrCode;
    let isProcessing = false;

    // Fungsi Jam Digital Realtime di Atas Kamera
function updateClock() {
    const now = new Date();
    // Gunakan id-ID agar formatnya 24 jam dan sesuai zona waktu perangkat
    const options = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
    document.getElementById('digital-clock').innerText = now.toLocaleTimeString('id-ID', options);
}
setInterval(updateClock, 1000);

    function onScanSuccess(decodedText) {
    // 1. Kunci proses agar tidak double-send (Anti-Spam)
    if (isProcessing) return;
    isProcessing = true;
    
    const statusBox = document.getElementById("status-container");
    const statusTxt = document.getElementById("status-text");
    const readerElem = document.getElementById("reader");

    // Efek visual saat memproses
    statusBox.style.backgroundColor = "#fff7ed"; // Oranye muda (Loading)
    statusTxt.innerHTML = `Memproses NIP: ${decodedText}...`;

    fetch(scriptURL, {
        method: "POST",
        mode: "cors", // Pastikan mode CORS aktif
        body: JSON.stringify({ qr: decodedText })
    })
    .then(res => {
        if (!res.ok) throw new Error("Respon Server Tidak Oke");
        return res.json();
    })
    .then(result => {
        // 2. Jika Berhasil (Data dari GAS diterima)
        if (result.success) {
            let ketText = result.status || "Berhasil";
            
            // Tentukan Tema Warna (Datang/Pulang)
            const isDatang = result.type === 'datang';
            const themeColor = isDatang ? '#2ecc71' : '#3498db';
            const themeBg = isDatang ? '#eafff0' : '#e3f2fd';

            readerElem.style.borderColor = themeColor;
            statusBox.style.backgroundColor = themeBg;
            statusTxt.innerHTML = `
                <div style="font-weight:bold; color:#1a1c42;">${result.nama}</div>
                <div style="font-size:11px; margin:4px 0;">${ketText}</div>
                <div style="font-size:18px; font-weight:bold;">${isDatang ? result.jamDatang : result.jamPulang}</div>
            `;
        } else {
            // 3. Jika Gagal Logika (Misal: Belum 10 menit atau sudah absen)
            statusBox.style.backgroundColor = "#fff0f0";
            statusTxt.innerHTML = `<span style="color:#d63031;">${result.message}</span>`;
            readerElem.style.borderColor = "#ff7675";
        }
    })
    .catch(err => {
        // Jika benar-benar gagal koneksi
        console.error("Fetch Error:", err);
        statusBox.style.backgroundColor = "#fff0f0";
        statusTxt.innerHTML = `<span style="color:#d63031;">Gagal terhubung ke Server GAS. Periksa Koneksi/URL Script.</span>`;
    })
    .finally(() => {
        // 4. JEDA SCANNER (Paling Penting)
        // Scanner baru akan terbuka kembali setelah 5 detik
        setTimeout(() => {
            isProcessing = false; // Membuka kunci
            readerElem.style.borderColor = "#ddd";
            statusBox.style.backgroundColor = "#fff0f0";
            statusTxt.innerHTML = "Siap scan berikutnya...";
        }, 5000); 
    });
}
    function startScanner(side) {
        if(html5QrCode) {
            html5QrCode.stop().then(() => {
                mountScanner(side);
            });
        } else {
            mountScanner(side);
        }
    }

    function mountScanner(side) {
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start(
            { facingMode: side }, 
            { fps: 10, qrbox: 200 },
            onScanSuccess
        ).then(() => {
            statusText.innerText = "Kamera Aktif. Silakan Scan.";
        }).catch(err => {
            statusText.innerText = "Gagal Kamera: " + err;
        });
    }

    function switchCamera(side) {
        startScanner(side);
    }

    // Browser sering memblokir audio otomatis, jadi kita butuh satu klik user di awal
    window.onclick = () => { beep.load(); };
    window.onload = () => startScanner("environment");
</script>
</body>
</html>
